<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私を構成する9つの能力</title>
    <meta name="description" content="最強の組み合わせを見つけよう">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=1.0">
    <link rel="icon" href="./icon.png">
</head>

<div id="game-container">
    <button id="mute-btn" class="mute-btn">🔊</button>
    <!-- 3x3 Ability Selection Screen -->
    <div id="selection-screen" class="screen">
        <h1>私を構成する9つの能力</h1>
        <p class="subtitle">27種類の能力から9つを選んで配置しよう<br>※同じ色の能力を揃えるとビンゴボーナス発生！</p>

        <div class="selection-container">
            <div id="ability-grid" class="grid">
                <!-- 9 empty slots will be generated by JS -->
            </div>

            <div id="ability-list" class="list-container">
                <!-- Ability list will be generated by JS -->
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="auto-select-btn">おまかせ配置</button>
            <button id="start-btn" disabled>9つの能力を選択してください</button>
        </div>
    </div>

    <!-- Main Game UI -->
    <div id="game-screen" class="screen hidden">
        <canvas id="game-canvas"></canvas>
        <div id="hud">
            <div class="hud-top">
                <span id="stage-display">Stage: 1</span>
                <span id="time-display">01:00</span>
            </div>
            <div class="hud-bottom">
                <div id="xp-bar-container">
                    <div id="xp-bar">
                        <span id="xp-text">0 / 10 XP</span>
                    </div>
                </div>
                <div id="level-display">Lv: 1</div>
                <div id="hp-bar-container">
                    <div id="hp-bar">
                        <span id="hp-text">100 / 100 HP</span>
                    </div>
                </div>
            </div>
            <div id="active-abilities" class="abilities-hud"></div>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen hidden">
        <h2>Game Over</h2>
        <p>クリアしたステージ数: <span id="final-score">0</span></p>
        <div id="final-abilities" class="grid" style="margin: 20px 0; pointer-events: none;"></div>
        <div style="display: flex; gap: 10px;">
            <button id="download-btn">画像を保存</button>
            <button id="share-btn">Xにシェアする</button>
        </div>
        <br>
        <button id="restart-btn">最初から</button>
    </div>

    <!-- Audio Elements -->
    <audio id="bgm-battle" src="audio/battleBGM.mp3" loop preload="auto"></audio>
    <audio id="se-button" src="audio/button.mp3" preload="auto"></audio>
    <audio id="se-boss-siren" src="audio/boss_siren.mp3" preload="auto"></audio>
    <audio id="se-boss-win" src="audio/boss_win.mp3" preload="auto"></audio>
    <audio id="se-charge" src="audio/charge.mp3" preload="auto"></audio>
    <audio id="se-damaged" src="audio/damaged.mp3" preload="auto"></audio>
    <audio id="se-gameover" src="audio/gameover.mp3" preload="auto"></audio>
    <audio id="se-slash" src="audio/slash.mp3" preload="auto"></audio>

</div>

<!-- Scripts -->
<script src="js/ability.js"></script>
<script src="js/ui.js"></script>
<script src="js/player.js"></script>
<script src="js/enemy.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
<script src="js/audio.js"></script>
</body>

</html>
